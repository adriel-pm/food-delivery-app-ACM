<!DOCTYPE html>
<html>
<head>
    <title>Syracuse Food Delivery</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
        .box { background: white; padding: 20px; border-radius: 8px; max-width: 400px; margin-bottom: 20px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); }
        input, select, button { display: block; width: 100%; margin: 10px 0; padding: 10px; }
        button { background: #ff6600; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🍊 Food Delivery Portal</h1>

    <div class="box">
        <h3>Register</h3>
        <input id="regEmail" placeholder="Email">
        <input id="regPass" type="password" placeholder="Password">
        <select id="regRole">
            <option value="customer">Customer</option>
            <option value="driver">Driver</option>
        </select>
        <button onclick="register()">Create Account</button>
    </div>

    <div id="status"></div>

    <script>
        async function register() {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPass').value;
            const role = document.getElementById('regRole').value;

            const response = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, role })
            });
            const data = await response.json();
            document.getElementById('status').innerText = data.message;
        }
    </script>
</body>
</html>
