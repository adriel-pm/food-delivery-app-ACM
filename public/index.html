<!DOCTYPE html>
<html>
<head>
    <title>Food Delivery App</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
        .box { background: white; padding: 20px; border-radius: 8px; max-width: 400px; margin: 0 auto 20px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); }
        input, select, button { display: block; width: 90%; margin: 10px auto; padding: 10px; border-radius: 5px; border: 1px solid #ccc;}
        button { background: #ff6600; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #e65c00; }
        .hidden { display: none; }
        .menu-item { border: 1px solid #ddd; padding: 10px; margin: 10px 0; border-radius: 5px; text-align: center; cursor: pointer; background: #fff8f0; }
        .menu-item:hover { background: #ffe0b2; }
        #popup { background: #333; color: white; padding: 15px; border-radius: 5px; text-align: center; margin-bottom: 15px; font-weight: bold; }
        .progress { color: #ff6600; font-size: 1.5em; text-transform: uppercase; text-align: center; margin-top: 20px; font-weight: bold;}
    </style>
</head>
<body>
    <h1 style="text-align: center;">🍊 Food Delivery Portal</h1>

    <div id="popup" class="hidden"></div>

    <div id="authBox" class="box">
        <h3 style="text-align: center;">Login or Register</h3>
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <select id="role"><option value="customer">Customer</option><option value="driver">Driver</option></select>
        <button onclick="authenticate('/login')">Login</button>
        <button onclick="authenticate('/register')" style="background: #444;">Register</button>
    </div>

    <div id="menuBox" class="box hidden">
        <h3 style="text-align: center;">Select Your Meal</h3>
        <div id="menuList"></div>
    </div>

    <div id="trackBox" class="box hidden">
        <h3 style="text-align: center;">Live Order Tracker</h3>
        <p style="text-align: center;">Order ID: <span id="displayOrderId"></span></p>
        <div id="trackerStatus" class="progress">PREPARING</div>
    </div>

    <script>
        let currentOrderId = null;
        let trackingInterval = null;

        // Show a temporary popup message
        function showPopup(msg) {
            const popup = document.getElementById('popup');
            popup.innerText = msg;
            popup.classList.remove('hidden');
            setTimeout(() => popup.classList.add('hidden'), 3000);
        }

        // Handles both Login and Registration
        async function authenticate(route) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            const res = await fetch(route, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, role })
            });
            const data = await res.json();
            
            if (res.ok) {
                showPopup(data.message);
                document.getElementById('authBox').classList.add('hidden');
                loadMenu(); // Move to next screen
            } else {
                showPopup("Error: " + data.message);
            }
        }

        // Fetches menu and builds clickable items
        async function loadMenu() {
            document.getElementById('menuBox').classList.remove('hidden');
            const res = await fetch('/menu');
            const menu = await res.json();
            
            const list = document.getElementById('menuList');
            list.innerHTML = '';
            menu.forEach(item => {
                const div = document.createElement('div');
                div.className = 'menu-item';
                div.innerHTML = `<strong>${item.name}</strong><br>$${item.price}`;
                div.onclick = () => placeOrder(item.id);
                list.appendChild(div);
            });
        }

        // Submits the order and starts the tracking screen
        async function placeOrder(itemId) {
            const res = await fetch('/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ itemId })
            });
            const data = await res.json();
            
            showPopup("Order Sent to Kitchen!");
            document.getElementById('menuBox').classList.add('hidden');
            document.getElementById('trackBox').classList.remove('hidden');
            document.getElementById('displayOrderId').innerText = data.orderId;
            
            currentOrderId = data.orderId;
            // Ask the server for an update every 2 seconds
            trackingInterval = setInterval(checkStatus, 2000); 
        }

        // Asks the Logic Layer for the current status
        async function checkStatus() {
            const res = await fetch(`/order/${currentOrderId}`);
            const data = await res.json();
            
            const display = document.getElementById('trackerStatus');
            const previousStatus = display.innerText.toLowerCase();
            const newStatus = data.status;

            if (previousStatus !== newStatus) {
                display.innerText = newStatus;
                showPopup(`Update: Order is now ${newStatus.toUpperCase()}`);
                
                // Stop asking the server once it's delivered
                if (newStatus === 'delivered') {
                    clearInterval(trackingInterval);
                    showPopup("Enjoy your food!");
                }
            }
        }
    </script>
</body>
</html>
